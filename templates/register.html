<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新規登録</title>
</head>
<body>
    <h1>新規登録</h1>

    <form method="POST">
        <label>ユーザー名:</label>
        <input type="text" name="username" required>
        <br>

        <label>パスワード:</label>
        <input type="password" name="password" required>
        <br>

        <button type="submit">登録する</button>
    </form>

    <p><a href="{{ url_for('login') }}">ログイン画面へ</a></p>
</body>
</html>
