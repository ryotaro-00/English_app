<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学習ログ編集</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", "Yu Gothic UI", sans-serif;
      background: #05070b;
      color: #ffffff;
      overflow: hidden;
    }

    body {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* 背景ベース */
    .page-bg {
  position: fixed;
  inset: 0;
  z-index: 0;

  background:
  radial-gradient(circle at 50% 60%, rgba(180,200,255,0.16), transparent 40%),
    /* 中央ほんのり光（波紋と合わせる） */
    radial-gradient(circle at 50% 60%, rgba(255,255,255,0.06), transparent 40%),

    /* 左上 */
    radial-gradient(circle at 20% 25%, rgba(255,255,255,0.04), transparent 30%),

    /* 右下 */
    radial-gradient(circle at 80% 75%, rgba(255,255,255,0.03), transparent 35%),

    /* グラデーションベース */
    linear-gradient(180deg, #020409 0%, #060b14 50%, #03060c 100%);
    
}





    /* ぼんやり光 */
    .glow {
      position: fixed;
      border-radius: 50%;
      filter: blur(70px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.22;
    }

    .glow-left {
      width: 280px;
      height: 280px;
      left: 14%;
      top: 22%;
      background: rgba(255, 255, 255, 0.16);
    }

    .glow-right {
      width: 320px;
      height: 320px;
      right: 10%;
      bottom: 18%;
      background: rgba(255, 255, 255, 0.12);
    }

    /* カード */
    .edit-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 500px;
      padding: 34px 30px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.055);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.11);
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .eyebrow {
      font-size: 0.78rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      margin-bottom: 14px;
    }

    h1 {
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin: 0 0 12px;
      color: rgba(255,255,255,0.96);
    }

    .subtext {
      color: rgba(255,255,255,0.68);
      font-size: 0.98rem;
      line-height: 1.8;
      margin-bottom: 28px;
    }

    .form-label {
      color: rgba(255,255,255,0.7);
      font-size: 0.92rem;
      font-weight: 500;
      margin-bottom: 8px;
    }

    .form-control {
      height: 52px;
      border-radius: 16px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.12);
      color: #ffffff;
      padding: 12px 16px;
      box-shadow: none;
      transition: all 0.2s ease;
    }

    .form-control::placeholder {
      color: rgba(255,255,255,0.35);
    }

    .form-control:focus {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.24);
      color: #ffffff;
      box-shadow: 0 0 0 0.18rem rgba(255,255,255,0.06);
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 0.8;
      cursor: pointer;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 26px;
    }

    .btn-main,
    .btn-sub {
      height: 52px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    .btn-main {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.1);
      color: #fff;
      backdrop-filter: blur(10px);
    }

    .btn-main:hover {
      background: rgba(255,255,255,0.16);
      transform: translateY(-1px);
      color: #fff;
    }

    .btn-sub {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.8);
    }

    .btn-sub:hover {
      background: rgba(255,255,255,0.08);
      color: #fff;
      transform: translateY(-1px);
    }

    @media (max-width: 576px) {
      body {
        padding: 16px;
      }

      .edit-card {
        padding: 28px 20px;
        border-radius: 24px;
      }

      .button-group {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="page-bg"></div>

  <div class="ripple-wrap">
    <div class="ripple r1"></div>
    <div class="ripple r2"></div>
    <div class="ripple r3"></div>
  </div>

  <div class="glow glow-left"></div>
  <div class="glow glow-right"></div>

  <div class="edit-card">
    <div class="eyebrow">English Study Log</div>
    <h1>学習ログ編集</h1>
    <p class="subtext">
      記録内容を静かに整えて、今の学習ログを更新します。
    </p>

    <form method="POST">
      <div class="mb-3">
        <label for="date" class="form-label">学習日</label>
        <input type="date" id="date" name="date" class="form-control" value="{{ log.study_date }}">
      </div>

      <div class="mb-3">
        <label for="content" class="form-label">学習内容</label>
        <input type="text" id="content" name="content" class="form-control" value="{{ log.content }}" placeholder="例：英単語、文法、リスニング">
      </div>

      <div class="mb-3">
        <label for="time" class="form-label">学習時間（分）</label>
        <input type="number" id="time" name="time" class="form-control" value="{{ log.time }}" placeholder="例：60">
      </div>

      <div class="button-group">
        <button type="submit" class="btn btn-main w-100">更新する</button>
        <a href="{{ url_for('home') }}" class="btn-sub w-100">戻る</a>
      </div>
    </form>
  </div>
</body>
</html>
