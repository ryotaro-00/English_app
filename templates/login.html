<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
</head>
<body>
    <h1>ログイン</h1>

    <form method="POST">
        <label>ユーザー名:</label>
        <input type="text" name="username" required>
        <br>

        <label>パスワード:</label>
        <input type="password" name="password" required>
        <br>

        <button type="submit">ログイン</button>
    </form>

    <p><a href="{{ url_for('register') }}">新規登録はこちら</a></p>
</body>
</html>
